name: CI-CD Pipeline

on:
  push:
    branches:
      - develop
      - main
      - master
  pull_request:

jobs:
  build-test:
    name: Build e Testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Build e Testes
        run: mvn clean test

  deploy-staging:
    name: Deploy Staging
    needs: build-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Build Docker
        run: docker build -t esg-app .

      - name: Run Staging Container
        run: |
          docker run -d -p 8080:8080 --name staging-app esg-app
          docker ps

  deploy-production:
    name: Deploy Produção
    needs: build-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    environment:
      name: production

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Debug files
        run: ls -la

      - name: Build Docker image
        run: docker build -f ./Dockerfile -t esg-app ./