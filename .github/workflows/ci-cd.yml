name: CI-CD Pipeline

on:
  push:
    branches:
      - develop
      - main
      - master
  pull_request:

jobs:
  build-test:
    name: Build e Testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Build do projeto
        run: mvn clean install

      - name: Rodar testes
        run: mvn test -Dspring.profiles.active=test

  deploy-staging:
    name: Deploy Staging
    needs: build-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Deploy em Staging
        run: |
          echo " Deploy em STAGING executado"
          # aqui você colocaria seu deploy real (Docker, SSH, etc.)

  deploy-production:
    name: Deploy Produção
    needs: build-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    environment:
      name: production

    steps:
      - name: Deploy em Produção
        run: |
          echo "🔥 Deploy em PRODUÇÃO executado"
          # aqui você colocaria seu deploy real